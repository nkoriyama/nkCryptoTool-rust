name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [openssl, vendored, rustcrypto, gui]
        include:
          - backend: openssl
            features: ""
            extra_deps: ""
          - backend: vendored
            features: "--features backend-openssl-vendored"
            extra_deps: ""
          - backend: rustcrypto
            features: "--no-default-features --features backend-rustcrypto"
            extra_deps: ""
          - backend: gui
            features: "--features gui,testing"
            extra_deps: "libxcb1-dev libxkbcommon-dev libwayland-dev libgtk-3-dev"
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libfontconfig1-dev \
          libssl-dev \
          pkg-config \
          ${{ matrix.extra_deps }}
    - name: Build
      run: cargo build --verbose ${{ matrix.features }}
    - name: Run tests
      run: cargo test --verbose ${{ matrix.features }}

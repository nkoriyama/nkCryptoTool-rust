# Phase 4 F4 release-blocking CI workflow.
#
# Triggers: push to main + pull_request (NOT pull_request_target — F4-X10).
#
# Default permissions: contents: read only (F4-X11). Step-level escalation
# is intentional and minimal.
#
# Action pin policy (F4-X15):
#   - Standard widely-trusted actions (actions/checkout, actions/cache,
#     Swatinem/rust-cache, dtolnay/rust-toolchain) are pinned to major
#     version (@vN). They are de facto Rust ecosystem standards.
#   - Third-party / less-trusted actions would require commit SHA pin, but
#     no such actions are used in this workflow.
#
# Secrets: not used in this workflow. No echo/printf/cat of secrets occurs
# anywhere (F4-X12).
#
# Caching strategy (F4-R8 + Gemini Trigger 1 §3.4#2):
#   - Swatinem/rust-cache@v2 covers ~/.cargo registry + target/ artifacts
#   - apt cache for Slint / Iroh system deps via actions/cache
#   - sccache could be added in v2.2 if compile time becomes a bottleneck

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Linux: full build + test + clippy + mandate_check (release-blocking)
  test-linux:
    name: Test (Linux, full)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mandate_check.sh needs git log against v2.0.4

      - name: Cache apt packages (Slint + Iroh deps)
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Slint / Iroh system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable

      - name: Mandate check (pre-flight)
        run: bash scripts/mandate_check.sh

      - name: cargo build (full features)
        run: |
          cargo build --features "gui-camera gui-notifications gui-screen-protection gui-file-transfer"

      # NOTE: -D warnings disabled in F4 due to pre-existing clippy debt
      # in src/utils.rs, src/backend/, etc. (60+ warnings unrelated to
      # Phase 4 work). Cleanup is a v2.2 task (PHASE5_ROADMAP §5 technical
      # debt). For F4 we run clippy as advisory to surface NEW warnings
      # introduced by F4 changes without blocking release on legacy debt.
      - name: cargo clippy (advisory)
        continue-on-error: true  # F4-X13 explicit allowance for advisory step
        run: |
          cargo clippy --all-targets \
            --features "testing gui-camera gui-notifications gui-screen-protection gui-file-transfer"

      - name: cargo test (gui_test + integration)
        run: |
          cargo test \
            --features "testing gui-camera gui-notifications gui-screen-protection gui-file-transfer"

  # Windows / macOS: build-only cross-compile sanity check.
  # Test full is deferred to v2.2 (PHASE5_ROADMAP §3.1) due to Slint backend
  # OS-specific flakiness needing further investigation.
  build-other-os:
    name: Build (${{ matrix.os }}, build-only)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-stable

      - name: cargo build (full features)
        run: |
          cargo build --features "gui-camera gui-notifications gui-screen-protection gui-file-transfer"

  # Optional: cargo audit for security advisories (F4-O2 推奨).
  # Non-blocking — security advisories are reviewed but do not fail the
  # workflow automatically (some advisories may be transitively unfixable).
  audit:
    name: cargo audit (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # F4-X13 explicit allowance for advisory step
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        run: cargo audit

# Phase 4 F4 release-blocking CI workflow.
#
# Triggers: push to main + pull_request (NOT pull_request_target — F4-X10).
#
# Default permissions: contents: read only (F4-X11). Step-level escalation
# is intentional and minimal.
#
# Action pin policy (F4-X15):
#   - Standard widely-trusted actions (actions/checkout, actions/cache,
#     Swatinem/rust-cache, dtolnay/rust-toolchain) are pinned to major
#     version (@vN). They are de facto Rust ecosystem standards.
#   - Third-party / less-trusted actions would require commit SHA pin, but
#     no such actions are used in this workflow.
#
# Secrets: not used in this workflow. No echo/printf/cat of secrets occurs
# anywhere (F4-X12).
#
# Caching strategy (F4-R8 + Gemini Trigger 1 §3.4#2):
#   - Swatinem/rust-cache@v2 covers ~/.cargo registry + target/ artifacts
#   - apt cache for Slint / Iroh system deps via actions/cache
#   - sccache could be added in v2.2 if compile time becomes a bottleneck

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Linux: full build + test + clippy + mandate_check (release-blocking)
  test-linux:
    name: Test (Linux, full)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mandate_check.sh needs git log against v2.0.4

      - name: Cache apt packages (Slint + Iroh deps)
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Slint / Iroh / OpenSSL system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable

      - name: Mandate check (pre-flight)
        run: bash scripts/mandate_check.sh

      - name: cargo build (full features, vendored openssl)
        # Use backend-openssl-vendored to bypass ubuntu-latest libssl3
        # idiosyncrasies in EVP_PKEY_Q_keygen for prime256v1 (observed in
        # F4 CI: works in distrobox build-env Fedora libssl, fails on
        # ubuntu-latest at runtime). Tracked in PHASE5_ROADMAP §3.1 for
        # cross-platform native libssl resolution.
        run: |
          cargo build --no-default-features --features "backend-openssl-vendored gui-camera gui-notifications gui-screen-protection gui-file-transfer"

      # NOTE: -D warnings disabled in F4 due to pre-existing clippy debt
      # in src/utils.rs, src/backend/, etc. (60+ warnings unrelated to
      # Phase 4 work). Cleanup is a v2.2 task (PHASE5_ROADMAP §5 technical
      # debt). For F4 we run clippy as advisory to surface NEW warnings
      # introduced by F4 changes without blocking release on legacy debt.
      - name: cargo clippy (advisory)
        continue-on-error: true  # F4-X13 explicit allowance for advisory step
        run: |
          cargo clippy --all-targets --no-default-features \
            --features "testing backend-openssl-vendored gui-camera gui-notifications gui-screen-protection gui-file-transfer"

      - name: cargo test (gui_test + integration, vendored openssl)
        run: |
          cargo test --no-default-features \
            --features "testing backend-openssl-vendored gui-camera gui-notifications gui-screen-protection gui-file-transfer"

      # Run #[ignore]'d tests (notably src/network/iroh.rs internal tests
      # using a tight 2s handshake_timeout that is flaky on slow CI runners).
      # Advisory only — surfaces results without blocking release. Tracked
      # for proper resolution in PHASE5_ROADMAP §3.3.
      - name: cargo test --ignored (advisory, slow PQC handshake tests)
        continue-on-error: true  # F4-X13 explicit allowance
        run: |
          cargo test --no-default-features \
            --features "testing backend-openssl-vendored gui-camera gui-notifications gui-screen-protection gui-file-transfer" \
            --lib -- --ignored

  # Windows / macOS build-only matrix is DEFERRED to v2.2.
  #
  # Initial F4 attempt revealed:
  #   - macos-latest (Apple Silicon): ring crate 0.17.x compile error on
  #     aarch64-darwin (CAPS_STATIC assertion) — requires ring pin / patch
  #     or macos-13 Intel runner switch
  #   - windows-latest: openssl-sys cannot locate OpenSSL — requires
  #     `vcpkg install openssl` setup or `backend-openssl-vendored` feature
  #     wiring at workflow level
  #
  # Both fixes are workflow / OS-setup work, not source code changes.
  # Deferred to v2.2 (PHASE5_ROADMAP §3.1: OS matrix の test full 化) with
  # explicit OS-specific environment preparation.

  # Optional: cargo audit for security advisories (F4-O2 推奨).
  # Non-blocking — security advisories are reviewed but do not fail the
  # workflow automatically (some advisories may be transitively unfixable).
  audit:
    name: cargo audit (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # F4-X13 explicit allowance for advisory step
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        run: cargo audit

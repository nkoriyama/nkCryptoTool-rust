[package]
name = "nk-crypto-tool"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
openssl = "0.10"
openssl-sys = "0.9"
clap = { version = "4.0", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
pqcrypto-mlkem = "0.1"
pqcrypto-mldsa = "0.1"
pqcrypto-traits = "0.3"
sha3 = "0.10"
hkdf = "0.12"
base64 = "0.21"
foreign-types = "0.3"
zeroize = { version = "1.0", features = ["derive"] }
rpassword = "7.2"
libc = "0.2"
tempfile = "3.8"
